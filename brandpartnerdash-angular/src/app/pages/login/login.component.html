<div class="flex min-h-screen items-center justify-center bg-background px-4">
  <div class="w-full max-w-sm space-y-8">
    <div class="flex flex-col items-center gap-3">
      <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-primary text-base font-bold text-primary-foreground shadow-md">
        BP
      </div>
      <div class="text-center">
        <h1 class="text-2xl font-semibold tracking-tight text-foreground">Welcome back</h1>
        <p class="mt-1 text-sm text-muted-foreground">Sign in to your Brand Partner account</p>
      </div>
    </div>

    <div class="rounded-2xl border border-border bg-card p-6 shadow-card">
      <form (ngSubmit)="submit($event)" class="space-y-5">
        <div class="space-y-1.5">
          <label for="email" class="text-sm font-medium text-foreground">Email</label>
          <input
            id="email"
            type="email"
            name="email"
            required
            [(ngModel)]="email"
            autocomplete="email"
            placeholder="you@example.com"
            class="mt-1.5 w-full rounded-md border border-input bg-background px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-ring"
          />
        </div>

        <div class="space-y-1.5">
          <div class="flex items-center justify-between">
            <label for="password" class="text-sm font-medium text-foreground">Password</label>
            <a routerLink="/" class="text-xs text-primary hover:underline">Forgot password?</a>
          </div>
          <div class="relative">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              required
              [(ngModel)]="password"
              autocomplete="current-password"
              placeholder="••••••••"
              class="w-full rounded-md border border-input bg-background px-3 py-2 pr-10 text-sm outline-none focus:ring-2 focus:ring-ring"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            >
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
        </div>

        @if (error) {
          <p class="rounded-lg bg-destructive/10 px-3 py-2 text-sm text-destructive">{{ error }}</p>
        }

        <button
          type="submit"
          [disabled]="loading"
          class="flex w-full items-center justify-center gap-2 rounded-md bg-primary px-4 py-2 text-sm font-medium text-primary-foreground disabled:opacity-50"
        >
          {{ loading ? 'Signing in…' : 'Sign in' }}
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-muted-foreground">
      Don't have an account?
      <a routerLink="/" class="text-primary hover:underline">Contact us</a>
    </p>
  </div>
</div>
