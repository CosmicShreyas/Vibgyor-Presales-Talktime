<div
  class="relative flex min-h-[140px] flex-col items-center justify-center rounded-xl border-2 border-dashed px-4 py-6 text-center transition-colors outline-none focus-within:ring-2 focus-within:ring-green-500/40 dark:focus-within:ring-green-400/30"
  [class.pointer-events-none]="disabled()"
  [class.opacity-60]="disabled()"
  [ngClass]="
    dragOver()
      ? 'border-green-500 bg-green-50 dark:border-green-400 dark:bg-green-950/40'
      : 'border-slate-300 bg-slate-50 dark:border-slate-500 dark:bg-slate-900/80'
  "
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  role="presentation"
>
  <input
    #fileInput
    type="file"
    [id]="inputId()"
    accept=".csv,text/csv"
    class="sr-only"
    [disabled]="disabled()"
    (change)="onInputChange($event)"
  />
  <svg
    class="mb-2 h-10 w-10 text-slate-400 dark:text-slate-500"
    width="40"
    height="40"
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor"
    aria-hidden="true"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="1.5"
      d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
    />
  </svg>
  <p class="text-sm font-medium text-slate-800 dark:text-slate-100">Drag &amp; drop your CSV file here</p>
  <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">or</p>
  <button
    type="button"
    class="mt-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 shadow-sm hover:bg-slate-50 dark:border-slate-500 dark:bg-slate-700 dark:text-white dark:hover:bg-slate-600"
    [disabled]="disabled()"
    (click)="browse(fileInput)"
  >
    Browse files
  </button>
  @if (selectedName()) {
    <p class="mt-3 max-w-full truncate text-xs font-medium text-green-700 dark:text-green-400" title="{{ selectedName()! }}">
      Selected: {{ selectedName() }}
    </p>
  }
</div>
